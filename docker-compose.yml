version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: darkatlas_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: darkatlas
    ports:
      - "5434:5432" # Maps port 5434 on host to port 5432 in container (avoids host port 5433 conflict)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    container_name: darkatlas_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@db:5432/darkatlas
      API_KEY: Buguard
      DEBUG: "true"
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
