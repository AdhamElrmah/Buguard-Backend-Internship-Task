name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: darkatlas_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff  # Install ruff for fast linting & formatting checks

      - name: Run linter (Ruff)
        run: ruff check .

      - name: Check code formatting (Ruff)
        run: ruff format --check .

      - name: Run test suite
        env:
          API_KEY: Buguard
          DATABASE_URL: postgresql+asyncpg://postgres:postgres123@localhost:5433/darkatlas_test
        run: pytest
